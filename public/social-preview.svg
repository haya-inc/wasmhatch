<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">WasmHatch — From issue to patch</title>
  <desc id="description">A dark technical poster for the browser-native, local-first open-source contribution workspace.</desc>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#ecefe8" stroke-opacity=".055"/>
    </pattern>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(772 112) rotate(128) scale(470 350)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d9ff43" stop-opacity=".18"/>
      <stop offset="1" stop-color="#d9ff43" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0b0a"/>
  <rect width="860" height="630" fill="url(#grid)"/>
  <rect width="860" height="630" fill="url(#glow)"/>
  <rect x="860" width="340" height="630" fill="#d9ff43"/>

  <g font-family="SFMono-Regular, Consolas, Liberation Mono, monospace">
    <text x="66" y="72" fill="#ecefe8" font-size="24" font-weight="800" letter-spacing="-1">WH</text>
    <text x="105" y="72" fill="#d9ff43" font-size="12" font-weight="700" letter-spacing="1.5">／01</text>
    <circle cx="615" cy="65" r="5" fill="#d9ff43"/>
    <text x="630" y="70" fill="#adb2aa" font-size="12" font-weight="700" letter-spacing="2">OPEN SOURCE · BROWSER NATIVE</text>

    <text x="69" y="245" fill="#ecefe8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="150" font-weight="900" letter-spacing="-12">WASM</text>
    <text x="116" y="378" fill="#d9ff43" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="150" font-weight="900" letter-spacing="-12">HATCH.</text>

    <line x1="70" y1="432" x2="790" y2="432" stroke="#ecefe8" stroke-opacity=".22"/>
    <text x="70" y="478" fill="#d8dcd4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="27" font-weight="600" letter-spacing="-.5">FROM ISSUE TO PATCH. NO SETUP IN BETWEEN.</text>

    <text x="70" y="574" fill="#777c74" font-size="12" font-weight="700" letter-spacing="1.2">HAYA-INC.GITHUB.IO/WASMHATCH</text>
    <text x="686" y="574" fill="#aeb3ab" font-size="11" font-weight="700" letter-spacing="1.6">LOCAL-FIRST · BYOK</text>
  </g>

  <g fill="#0a0b0a" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace">
    <rect x="910" y="54" width="68" height="68" rx="7" fill="#0a0b0a"/>
    <text x="925" y="96" fill="#d9ff43" font-size="22" font-weight="900" letter-spacing="-2">WH</text>
    <text x="1002" y="77" font-size="11" font-weight="800" letter-spacing="1.7">CONTRIBUTION</text>
    <text x="1002" y="101" font-size="11" font-weight="800" letter-spacing="1.7">WORKSPACE</text>

    <text x="910" y="234" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="108" font-weight="900" letter-spacing="-7">01</text>
    <line x1="910" y1="274" x2="1148" y2="274" stroke="#0a0b0a" stroke-opacity=".42"/>

    <text x="910" y="329" font-size="12" font-weight="800" letter-spacing="2">01 / IMPORT</text>
    <text x="910" y="388" font-size="12" font-weight="800" letter-spacing="2">02 / INSPECT</text>
    <text x="910" y="447" font-size="12" font-weight="800" letter-spacing="2">03 / PATCH</text>
    <path d="M910 350h205l20-20m-20 20 20 20M910 409h205l20-20m-20 20 20 20" fill="none" stroke="#0a0b0a" stroke-width="2"/>

    <rect x="910" y="520" width="238" height="54" fill="#0a0b0a"/>
    <text x="934" y="553" fill="#d9ff43" font-size="12" font-weight="800" letter-spacing="1.3">OPEN A REAL TASK →</text>
  </g>
</svg>
