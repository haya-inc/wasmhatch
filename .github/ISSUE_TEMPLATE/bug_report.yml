name: Bug report
description: Report a reproducible WasmHatch problem
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, private source, or exploit details here. Use private vulnerability reporting for security issues.
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use the sample workspace when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
