name: Feature request
description: Propose a focused improvement to the business-operator workflow
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Business workflow problem
      description: What bounded operator task, review, or trust-boundary friction does this address?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Smallest useful outcome
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Security, licensing, or browser constraints
      description: Include requested data access, durable effects, conflict behavior, and whether a server would be required.
